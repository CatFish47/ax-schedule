<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d0d1a">
  <title>AX Schedule 2026</title>
  <link rel="stylesheet" href="./src/css/styles.css">
</head>
<body>
  <div id="app">
    <header id="app-header" aria-label="Application header">
      <span class="app-name">AX <span>Schedule</span></span>
    </header>

    <nav id="nav-tabs" role="tablist" aria-label="Views">
      <!-- Populated by app.js -->
    </nav>

    <div id="day-selector" role="tablist" aria-label="Day selector">
      <!-- Populated by app.js -->
    </div>

    <main id="app-main" aria-live="polite">
      <div class="empty-state">
        <div class="empty-icon">⏳</div>
        <p>Loading schedule…</p>
      </div>
    </main>
  </div>

  <script type="module" src="./src/js/app.js"></script>
</body>
</html>
